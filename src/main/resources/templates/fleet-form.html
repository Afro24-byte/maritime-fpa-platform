<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Create Fleet</title>
</head>

<body>

<h1>Create Fleet</h1>

<form th:action="@{/fleets}"
      th:object="${fleet}"
      method="post">

  <input type="hidden" th:field="*{id}">

  <div>
    <label for="name">Fleet Name:</label>
    <input type="text"
           id="name"
           th:field="*{name}">
  </div>

  <br>

  <div>
    <label for="description">Description:</label>
    <textarea id="description"
              th:field="*{description}">
        </textarea>
  </div>

  <br>

  <div>
    <label for="active">Active:</label>
    <input type="checkbox"
           id="active"
           th:field="*{active}">
  </div>

  <br>

  <button type="submit">Save Fleet</button>

</form>

<br>

<a th:href="@{/fleets}">Back to Fleet List</a>

</body>

</html>
