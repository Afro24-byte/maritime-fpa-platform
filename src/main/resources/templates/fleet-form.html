<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Create Fleet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

  <div class="page-header">

    <h1>Create Fleet</h1>

    <p class="text-secondary">
      Create or update a fleet record.
    </p>

  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <form th:action="@{/fleets}"
            th:object="${fleet}"
            method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">

          <label for="name" class="form-label">
            Fleet Name
          </label>

          <input type="text"
                 id="name"
                 class="form-control"
                 th:field="*{name}"
                 required>

        </div>

        <div class="mb-3">

          <label for="description" class="form-label">
            Description
          </label>

          <textarea id="description"
                    class="form-control"
                    rows="4"
                    th:field="*{description}">
                    </textarea>

        </div>

        <div class="form-check mb-4">

          <input type="checkbox"
                 id="active"
                 class="form-check-input"
                 th:field="*{active}">

          <label for="active"
                 class="form-check-label">
            Active
          </label>

        </div>

        <button type="submit"
                class="btn btn-primary">
          Save Fleet
        </button>

        <a th:href="@{/fleets}"
           class="btn btn-outline-secondary ms-2">
          Cancel
        </a>

      </form>

    </div>

  </div>

</div>

</body>

</html>
