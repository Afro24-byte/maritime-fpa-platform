<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Budget Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

    <div class="page-header">

        <h1>Budget Management</h1>

        <p class="text-secondary">
            Manage annual vessel budgets and planning.
        </p>

    </div>

    <div th:if="${success}"
         class="alert alert-success"
         th:text="${success}">
    </div>

    <nav class="mb-4">

        <a th:href="@{/admin/dashboard}"
           class="btn btn-outline-secondary btn-sm">
            Dashboard
        </a>

    </nav>

    <div class="mb-4">

        <a th:href="@{/budgets/new}"
           class="btn btn-primary">
            + Create New Budget
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-striped table-hover align-middle mb-0">

                <thead class="table-dark">

                <tr>
                    <th>Year</th>
                    <th>Vessel</th>
                    <th>Total Budget</th>
                    <th>Status</th>
                    <th style="width:180px;">Actions</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="budget : ${budgets}">

                    <td th:text="${budget.budgetYear}"></td>

                    <td th:text="${budget.vessel.name}"></td>

                    <td th:text="${#numbers.formatDecimal(budget.totalBudget,1,'POINT',2,'COMMA')}"></td>

                    <td>

                        <span th:if="${budget.status.name() == 'DRAFT'}"
                              class="badge bg-secondary"
                              th:text="${budget.status}">
                        </span>

                        <span th:if="${budget.status.name() == 'SUBMITTED'}"
                              class="badge bg-warning text-dark"
                              th:text="${budget.status}">
                        </span>

                        <span th:if="${budget.status.name() == 'APPROVED'}"
                              class="badge bg-success"
                              th:text="${budget.status}">
                        </span>

                    </td>

                    <td>

                        <a th:href="@{/budgets/edit/{id}(id=${budget.id})}"
                           class="btn btn-sm btn-warning">
                            Edit
                        </a>

                        <a th:href="@{/budgets/delete/{id}(id=${budget.id})}"
                           class="btn btn-sm btn-danger">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
