<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Variance Analysis</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

  <div class="page-header">

    <h1>Budget vs Actual Variance Analysis</h1>

    <p class="text-secondary">
      Compare Budget and Actual performance by vessel and fiscal year.
    </p>

  </div>

  <div th:if="${error}"
       class="alert alert-danger"
       th:text="${error}">
  </div>

  <div class="card shadow-sm mb-4">

    <div class="card-body">

      <form th:action="@{/variance}" method="post">

        <div class="row">

          <div class="col-md-5">

            <label class="form-label">Vessel</label>

            <select name="vesselId"
                    class="form-select"
                    required>

              <option value="">Select Vessel</option>

              <option th:each="vessel : ${vessels}"
                      th:value="${vessel.id}"
                      th:text="${vessel.name}">
              </option>

            </select>

          </div>

          <div class="col-md-3">

            <label class="form-label">Year</label>

            <input type="number"
                   name="year"
                   class="form-control"
                   required>

          </div>

          <div class="col-md-4 d-flex align-items-end">

            <button type="submit"
                    class="btn btn-primary w-100">
              Calculate Variance
            </button>

          </div>

        </div>

      </form>

    </div>

  </div>

  <div th:if="${result != null}"
       class="card shadow-sm">

    <div class="card-body">

      <table class="table table-striped table-hover align-middle mb-0">

        <thead class="table-dark">

        <tr>
          <th>Category</th>
          <th>Budget</th>
          <th>Actual</th>
          <th>Variance</th>
          <th>Variance %</th>
        </tr>

        </thead>

        <tbody>

        <tr>
          <td>Fuel</td>
          <td th:text="${#numbers.formatDecimal(result.budget.fuelCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.actual.fuelCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.fuelVariance,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.fuelVariancePercentage,1,'POINT',2,'COMMA')} + '%'"></td>
        </tr>

        <tr>
          <td>Crew</td>
          <td th:text="${#numbers.formatDecimal(result.budget.crewCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.actual.crewCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.crewVariance,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.crewVariancePercentage,1,'POINT',2,'COMMA')} + '%'"></td>
        </tr>

        <tr>
          <td>Maintenance</td>
          <td th:text="${#numbers.formatDecimal(result.budget.maintenanceCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.actual.maintenanceCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.maintenanceVariance,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.maintenanceVariancePercentage,1,'POINT',2,'COMMA')} + '%'"></td>
        </tr>

        <tr>
          <td>Insurance</td>
          <td th:text="${#numbers.formatDecimal(result.budget.insuranceCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.actual.insuranceCost,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.insuranceVariance,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.insuranceVariancePercentage,1,'POINT',2,'COMMA')} + '%'"></td>
        </tr>

        <tr>
          <td>Port Charges</td>
          <td th:text="${#numbers.formatDecimal(result.budget.portCharges,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.actual.portCharges,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.portVariance,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.portVariancePercentage,1,'POINT',2,'COMMA')} + '%'"></td>
        </tr>

        <tr>
          <td>Other Expenses</td>
          <td th:text="${#numbers.formatDecimal(result.budget.otherExpenses,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.actual.otherExpenses,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.otherVariance,1,'POINT',2,'COMMA')}"></td>
          <td th:text="${#numbers.formatDecimal(result.otherVariancePercentage,1,'POINT',2,'COMMA')} + '%'"></td>
        </tr>

        <tr class="table-primary">

          <th>Total</th>

          <th th:text="${#numbers.formatDecimal(result.budget.totalBudget,1,'POINT',2,'COMMA')}"></th>

          <th th:text="${#numbers.formatDecimal(result.actual.totalActual,1,'POINT',2,'COMMA')}"></th>

          <th th:text="${#numbers.formatDecimal(result.totalVariance,1,'POINT',2,'COMMA')}"></th>

          <th th:text="${#numbers.formatDecimal(result.totalVariancePercentage,1,'POINT',2,'COMMA')} + '%'"></th>

        </tr>

        </tbody>

      </table>

    </div>

  </div>

  <div class="mt-4">

    <a th:href="@{/admin/dashboard}"
       class="btn btn-outline-secondary">
      Dashboard
    </a>

  </div>

</div>

</body>

</html>
