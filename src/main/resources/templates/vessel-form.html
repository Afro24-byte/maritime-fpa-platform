<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Vessel Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

  <div class="page-header">

    <h1>Vessel Management</h1>

    <p class="text-secondary">
      Create or update vessel information.
    </p>

  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <form th:action="@{/vessels}"
            th:object="${vessel}"
            method="post">

        <input type="hidden" th:field="*{id}">

        <h4 class="mb-3">General Information</h4>

        <div class="mb-3">
          <label class="form-label">Vessel Name</label>
          <input type="text"
                 class="form-control"
                 th:field="*{name}"
                 required>
        </div>

        <div class="mb-3">
          <label class="form-label">IMO Number</label>
          <input type="text"
                 class="form-control"
                 th:field="*{imoNumber}"
                 required>
        </div>

        <div class="mb-4">
          <label class="form-label">Fleet</label>

          <select id="fleetId"
                  name="fleetId"
                  class="form-select"
                  required>

            <option value="">-- Select Fleet --</option>

            <option th:each="fleet : ${fleets}"
                    th:value="${fleet.id}"
                    th:text="${fleet.name}"
                    th:selected="${vessel.fleet != null and vessel.fleet.id == fleet.id}">
            </option>

          </select>

        </div>

        <hr class="my-4">

        <h4 class="mb-3">Technical Information</h4>

        <div class="mb-3">
          <label class="form-label">Vessel Type</label>

          <select class="form-select"
                  th:field="*{vesselType}">

            <option th:each="type : ${T(com.afroditigkotsi.maritimefpaplatform.enums.VesselType).values()}"
                    th:value="${type}"
                    th:text="${type}">
            </option>

          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Fuel Type</label>

          <select class="form-select"
                  th:field="*{fuelType}">

            <option th:each="fuel : ${T(com.afroditigkotsi.maritimefpaplatform.enums.FuelType).values()}"
                    th:value="${fuel}"
                    th:text="${fuel}">
            </option>

          </select>

        </div>

        <div class="mb-3">
          <label class="form-label">Build Year</label>

          <input type="number"
                 class="form-control"
                 th:field="*{buildYear}">
        </div>

        <div class="mb-3">
          <label class="form-label">Deadweight Tonnage</label>

          <input type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{deadweightTonnage}">
        </div>

        <div class="mb-4">
          <label class="form-label">Flag Country</label>

          <input type="text"
                 class="form-control"
                 th:field="*{flagCountry}">
        </div>

        <hr class="my-4">

        <h4 class="mb-3">Operational Status</h4>

        <div class="mb-3">
          <label class="form-label">Vessel Status</label>

          <select class="form-select"
                  th:field="*{vesselStatus}">

            <option th:each="status : ${T(com.afroditigkotsi.maritimefpaplatform.enums.VesselStatus).values()}"
                    th:value="${status}"
                    th:text="${status}">
            </option>

          </select>

        </div>

        <div class="form-check mb-4">

          <input type="checkbox"
                 class="form-check-input"
                 th:field="*{active}">

          <label class="form-check-label">
            Active
          </label>

        </div>

        <button type="submit"
                class="btn btn-primary">
          Save Vessel
        </button>

        <a th:href="@{/vessels}"
           class="btn btn-outline-secondary ms-2">
          Cancel
        </a>

      </form>

    </div>

  </div>

</div>

</body>

</html>
