<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Vessel Management</title>
</head>

<body>

<h1>Vessel Management</h1>

<form th:action="@{/vessels}"
      th:object="${vessel}"
      method="post">

  <input type="hidden" th:field="*{id}">

  <h2>General Information</h2>

  <p>
    <label>Vessel Name</label><br>
    <input type="text" th:field="*{name}">
  </p>

  <p>
    <label>IMO Number</label><br>
    <input type="text" th:field="*{imoNumber}">
  </p>

  <p>
    <label>Fleet</label><br>

    <select id="fleetId"
            name="fleetId"
            required>

      <option value="">-- Select Fleet --</option>

      <option th:each="fleet : ${fleets}"
              th:value="${fleet.id}"
              th:text="${fleet.name}"
              th:selected="${vessel.fleet != null and vessel.fleet.id == fleet.id}">
      </option>

    </select>

  </p>

  <hr>

  <h2>Technical Information</h2>

  <p>
    <label>Vessel Type</label><br>

    <select th:field="*{vesselType}">
      <option th:each="type : ${T(com.afroditigkotsi.maritimefpaplatform.enums.VesselType).values()}"
              th:value="${type}"
              th:text="${type}">
      </option>
    </select>

  </p>

  <p>
    <label>Fuel Type</label><br>

    <select th:field="*{fuelType}">
      <option th:each="fuel : ${T(com.afroditigkotsi.maritimefpaplatform.enums.FuelType).values()}"
              th:value="${fuel}"
              th:text="${fuel}">
      </option>
    </select>

  </p>

  <p>
    <label>Build Year</label><br>
    <input type="number" th:field="*{buildYear}">
  </p>

  <p>
    <label>Deadweight Tonnage</label><br>
    <input type="number"
           step="0.01"
           th:field="*{deadweightTonnage}">
  </p>

  <p>
    <label>Flag Country</label><br>
    <input type="text" th:field="*{flagCountry}">
  </p>

  <hr>

  <h2>Operational Status</h2>

  <p>

    <label>Vessel Status</label><br>

    <select th:field="*{vesselStatus}">
      <option th:each="status : ${T(com.afroditigkotsi.maritimefpaplatform.enums.VesselStatus).values()}"
              th:value="${status}"
              th:text="${status}">
      </option>
    </select>

  </p>

  <p>

    <label>Active</label>
    <input type="checkbox"
           th:field="*{active}">

  </p>

  <br>

  <button type="submit">
    Save Vessel
  </button>

</form>

<br>

<a th:href="@{/vessels}">
  Back to Vessel List
</a>

</body>

</html>
