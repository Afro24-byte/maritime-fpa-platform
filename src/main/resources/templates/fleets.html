<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Fleet Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

    <div class="page-header">

        <h1>Fleet Management</h1>

        <p class="text-secondary">
            Manage fleet records and vessel groups.
        </p>

    </div>

    <div th:if="${success}"
         class="alert alert-success"
         th:text="${success}">
    </div>

    <nav class="mb-4">

        <a th:href="@{/dashboard}"
           class="btn btn-outline-secondary btn-sm">
            Dashboard
        </a>

        <a th:href="@{/vessels}"
           class="btn btn-outline-secondary btn-sm">
            Vessel Management
        </a>

    </nav>

    <div class="mb-4">

        <a th:href="@{/fleets/new}"
           class="btn btn-primary">
            + Create New Fleet
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-striped table-hover align-middle mb-0">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Active</th>
                    <th style="width:180px;">Actions</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="fleet : ${fleets}">

                    <td th:text="${fleet.id}"></td>

                    <td th:text="${fleet.name}"></td>

                    <td th:text="${fleet.description}"></td>

                    <td>

                        <span th:if="${fleet.active}"
                              class="badge bg-success">
                            Active
                        </span>

                        <span th:unless="${fleet.active}"
                              class="badge bg-secondary">
                            Inactive
                        </span>

                    </td>

                    <td>

                        <a th:href="@{/fleets/{id}/edit(id=${fleet.id})}"
                           class="btn btn-sm btn-warning">
                            Edit
                        </a>

                        <a th:href="@{/fleets/delete/{id}(id=${fleet.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure you want to delete this fleet?');">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
