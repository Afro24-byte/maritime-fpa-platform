<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Create Budget</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

  <div class="page-header">

    <h1>Create Budget</h1>

    <p class="text-secondary">
      Create or update an annual budget for a vessel.
    </p>

  </div>

  <div th:if="${error}"
       class="alert alert-danger"
       th:text="${error}">
  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <form th:action="@{/budgets/save}"
            th:object="${budget}"
            method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
          <label class="form-label">Vessel</label>

          <select name="vesselId"
                  class="form-select"
                  required>

            <option value="">-- Select Vessel --</option>

            <option th:each="vessel : ${vessels}"
                    th:value="${vessel.id}"
                    th:text="${vessel.name}"
                    th:selected="${budget.vessel != null and budget.vessel.id == vessel.id}">
            </option>

          </select>

        </div>

        <div class="mb-4">
          <label class="form-label">Budget Year</label>

          <input type="number"
                 class="form-control"
                 th:field="*{budgetYear}"
                 required>
        </div>

        <hr class="my-4">

        <h4 class="mb-3">Operating Costs</h4>

        <div class="mb-3">
          <label class="form-label">Fuel Cost</label>

          <input type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{fuelCost}">
        </div>

        <div class="mb-3">
          <label class="form-label">Crew Cost</label>

          <input type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{crewCost}">
        </div>

        <div class="mb-3">
          <label class="form-label">Maintenance Cost</label>

          <input type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{maintenanceCost}">
        </div>

        <div class="mb-3">
          <label class="form-label">Insurance Cost</label>

          <input type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{insuranceCost}">
        </div>

        <div class="mb-3">
          <label class="form-label">Port Charges</label>

          <input type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{portCharges}">
        </div>

        <div class="mb-4">
          <label class="form-label">Other Expenses</label>

          <input type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{otherExpenses}">
        </div>

        <hr class="my-4">

        <div class="mb-4">

          <label class="form-label">Status</label>

          <select class="form-select"
                  th:field="*{status}">

            <option th:each="status : ${statuses}"
                    th:value="${status}"
                    th:text="${status}">
            </option>

          </select>

        </div>

        <button type="submit"
                class="btn btn-primary">
          Save Budget
        </button>

        <a th:href="@{/budgets}"
           class="btn btn-outline-secondary ms-2">
          Cancel
        </a>

      </form>

    </div>

  </div>

</div>

</body>

</html>
