<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Forecast Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

  <div class="page-header">

    <h1>Forecast Management</h1>

    <p class="text-secondary">
      Manage financial forecasts and planning scenarios.
    </p>

  </div>

  <div th:if="${success}"
       class="alert alert-success"
       th:text="${success}">
  </div>

  <nav class="mb-4">

    <a th:href="@{/admin/dashboard}"
       class="btn btn-outline-secondary btn-sm">
      Dashboard
    </a>

  </nav>

  <div class="mb-4">

    <a th:href="@{/forecasts/new}"
       class="btn btn-primary">
      + Create New Forecast
    </a>

  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <table class="table table-striped table-hover align-middle mb-0">

        <thead class="table-dark">

        <tr>
          <th>Vessel</th>
          <th>Budget Year</th>
          <th>Scenario</th>
          <th>Status</th>
          <th>Operating Days</th>
          <th>Off Hire Days</th>
          <th>Daily Revenue Rate</th>
          <th>Total Forecast</th>
          <th style="width:180px;">Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="forecast : ${forecasts}">

          <td th:text="${forecast.vessel.name}"></td>

          <td th:text="${forecast.budget.budgetYear}"></td>

          <td th:text="${forecast.scenarioType}"></td>

          <td>

                        <span th:if="${forecast.status.name() == 'DRAFT'}"
                              class="badge bg-secondary"
                              th:text="${forecast.status}">
                        </span>

            <span th:if="${forecast.status.name() == 'SUBMITTED'}"
                  class="badge bg-warning text-dark"
                  th:text="${forecast.status}">
                        </span>

            <span th:if="${forecast.status.name() == 'APPROVED'}"
                  class="badge bg-success"
                  th:text="${forecast.status}">
                        </span>

          </td>

          <td th:text="${forecast.operatingDays}"></td>

          <td th:text="${forecast.offHireDays}"></td>

          <td th:text="${#numbers.formatDecimal(forecast.dailyRevenueRate,1,'POINT',2,'COMMA')}"></td>

          <td th:text="${#numbers.formatDecimal(forecast.totalForecast,1,'POINT',2,'COMMA')}"></td>

          <td>

            <a th:href="@{/forecasts/{id}/edit(id=${forecast.id})}"
               class="btn btn-sm btn-warning">
              Edit
            </a>

            <a th:href="@{/forecasts/{id}/delete(id=${forecast.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Are you sure you want to delete this Forecast?');">
              Delete
            </a>

          </td>

        </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

</body>

</html>
