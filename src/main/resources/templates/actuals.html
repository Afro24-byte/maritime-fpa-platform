<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Actual Performance</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

  <div class="page-header">

    <h1>Actual Performance</h1>

    <p class="text-secondary">
      Manage actual financial performance for each vessel.
    </p>

  </div>

  <div th:if="${success}"
       class="alert alert-success"
       th:text="${success}">
  </div>

  <nav class="mb-4">

    <a th:href="@{/admin/dashboard}"
       class="btn btn-outline-secondary btn-sm">
      Dashboard
    </a>

  </nav>

  <div class="mb-4">

    <a th:href="@{/actuals/new}"
       class="btn btn-primary">
      + Create New Actual
    </a>

  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <table class="table table-striped table-hover align-middle mb-0">

        <thead class="table-dark">

        <tr>
          <th>Year</th>
          <th>Vessel</th>
          <th>Total Actual</th>
          <th>Status</th>
          <th style="width:180px;">Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="actual : ${actuals}">

          <td th:text="${actual.actualYear}"></td>

          <td th:text="${actual.vessel.name}"></td>

          <td th:text="${#numbers.formatDecimal(actual.totalActual,1,'POINT',2,'COMMA')}"></td>

          <td>

                        <span th:if="${actual.status.name() == 'DRAFT'}"
                              class="badge bg-secondary"
                              th:text="${actual.status}">
                        </span>

            <span th:if="${actual.status.name() == 'SUBMITTED'}"
                  class="badge bg-warning text-dark"
                  th:text="${actual.status}">
                        </span>

            <span th:if="${actual.status.name() == 'APPROVED'}"
                  class="badge bg-success"
                  th:text="${actual.status}">
                        </span>

          </td>

          <td>

            <a th:href="@{/actuals/edit/{id}(id=${actual.id})}"
               class="btn btn-sm btn-warning">
              Edit
            </a>

            <a th:href="@{/actuals/delete/{id}(id=${actual.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Are you sure you want to delete this Actual?');">
              Delete
            </a>

          </td>

        </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

</body>

</html>
