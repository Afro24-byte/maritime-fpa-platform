<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Forecast</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

    <div class="page-header">

        <h1>Create Forecast</h1>

        <p class="text-secondary">
            Create or update financial forecast scenarios.
        </p>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <form th:action="@{${formAction}}"
                  th:object="${forecast}"
                  method="post">

                <h4 class="mb-3">Forecast Information</h4>

                <div class="mb-3">

                    <label class="form-label">Vessel</label>

                    <select id="vesselId"
                            name="vesselId"
                            class="form-select"
                            required>

                        <option value="">Select Vessel</option>

                        <option th:each="vessel : ${vessels}"
                                th:value="${vessel.id}"
                                th:text="${vessel.name}"
                                th:selected="${forecast.vessel != null and forecast.vessel.id == vessel.id}">
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Budget</label>

                    <select id="budgetId"
                            name="budgetId"
                            class="form-select"
                            required>

                        <option value="">Select Budget</option>

                        <option th:each="budget : ${budgets}"
                                th:value="${budget.id}"
                                th:text="${budget.vessel.name + ' - ' + budget.budgetYear}"
                                th:selected="${forecast.budget != null and forecast.budget.id == budget.id}">
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Scenario</label>

                    <select class="form-select"
                            th:field="*{scenarioType}"
                            required>

                        <option th:each="scenario : ${scenarioTypes}"
                                th:value="${scenario}"
                                th:text="${scenario}">
                        </option>

                    </select>

                </div>

                <div class="mb-4">

                    <label class="form-label">Status</label>

                    <select class="form-select"
                            th:field="*{status}"
                            required>

                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}">
                        </option>

                    </select>

                </div>

                <hr class="my-4">

                <h4 class="mb-3">Operational Assumptions</h4>

                <div class="mb-3">

                    <label class="form-label">Operating Days</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{operatingDays}"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Off Hire Days</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{offHireDays}"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label">Daily Revenue Rate</label>

                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{dailyRevenueRate}"
                           required>

                </div>

                <hr class="my-4">

                <h4 class="mb-3">Forecast Costs</h4>

                <div class="mb-3">
                    <label class="form-label">Fuel Cost</label>
                    <input type="number" step="0.01"
                           class="form-control"
                           th:field="*{fuelCost}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Crew Cost</label>
                    <input type="number" step="0.01"
                           class="form-control"
                           th:field="*{crewCost}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Maintenance Cost</label>
                    <input type="number" step="0.01"
                           class="form-control"
                           th:field="*{maintenanceCost}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Insurance Cost</label>
                    <input type="number" step="0.01"
                           class="form-control"
                           th:field="*{insuranceCost}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Port Charges</label>
                    <input type="number" step="0.01"
                           class="form-control"
                           th:field="*{portCharges}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Other Expenses</label>
                    <input type="number" step="0.01"
                           class="form-control"
                           th:field="*{otherExpenses}" required>
                </div>

                <button type="submit"
                        class="btn btn-primary">
                    Save Forecast
                </button>

                <a th:href="@{/forecasts}"
                   class="btn btn-outline-secondary ms-2">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
