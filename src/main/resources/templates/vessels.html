<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Vessel Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container">

  <div class="page-header">

    <h1>Vessel Management</h1>

    <p class="text-secondary">
      Manage vessel information and fleet assignments.
    </p>

  </div>

  <nav class="mb-4">

    <a th:href="@{/dashboard}"
       class="btn btn-outline-secondary btn-sm">
      Dashboard
    </a>

    <a th:href="@{/fleets}"
       class="btn btn-outline-secondary btn-sm">
      Fleet Management
    </a>

  </nav>

  <div class="mb-4">

    <a th:href="@{/vessels/new}"
       class="btn btn-primary">
      + Create Vessel
    </a>

  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <table class="table table-striped table-hover align-middle mb-0">

        <thead class="table-dark">

        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>IMO Number</th>
          <th>Fleet</th>
          <th>Status</th>
          <th style="width:180px;">Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="vessel : ${vessels}">

          <td th:text="${vessel.id}"></td>

          <td th:text="${vessel.name}"></td>

          <td th:text="${vessel.imoNumber}"></td>

          <td th:text="${vessel.fleet.name}"></td>

          <td>

                        <span th:if="${vessel.active}"
                              class="badge bg-success">
                            Active
                        </span>

            <span th:unless="${vessel.active}"
                  class="badge bg-secondary">
                            Inactive
                        </span>

          </td>

          <td>

            <a th:href="@{/vessels/{id}/edit(id=${vessel.id})}"
               class="btn btn-sm btn-warning">
              Edit
            </a>

            <a th:href="@{/vessels/delete/{id}(id=${vessel.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Are you sure you want to delete this vessel?');">
              Delete
            </a>

          </td>

        </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

</body>

</html>
